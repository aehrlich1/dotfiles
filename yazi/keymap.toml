[[input.prepend_keymap]]
on   = [ "<Esc>" ]
run  = "close"
desc = "Cancel input"

[[mgr.prepend_keymap]]
on = "<Esc>"
run =   ["escape --all", "unyank"]
desc = "Unyank selection" 

[[mgr.prepend_keymap]]
on = "<Enter>"
run = "plugin smart-enter"
desc = "Enter the child directory, or open the file"

[[mgr.prepend_keymap]]
on = ["g", "s"]
run = "cd ~/src"
desc = "Go to source directory"

[[mgr.prepend_keymap]]
on = ["g", "l"]
run = "cd sftp://slurm-login"
desc = "Go to slurm-login"

[[mgr.prepend_keymap]]
on = ["g", "D"]
run = "cd ~/Desktop"
desc = "Go to desktop directory"

[[mgr.prepend_keymap]]
on = ["g", "n"]
run = "cd ~/.config/nvim"
desc = "Go to nvim config directory"

[[mgr.prepend_keymap]]
on = "w"
run = "plugin zoxide"
desc = "Jump to a directory via zoxide"

[[mgr.prepend_keymap]]
on = "W"
run = "plugin fzf"
desc = "Jump to a file/directory via fzf"

[[mgr.prepend_keymap]]
on = "T"
run = "tasks:show"
desc = "Show task manager"

[[mgr.prepend_keymap]]
on   = ["c", "a"]
run  = "plugin compress"
desc = "Archive selected files"

